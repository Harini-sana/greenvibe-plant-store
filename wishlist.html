<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GreenVibe Wishlist</title>
<style>
  :root {
    --primary-green: #2d5f3f;
    --light-green: #4a8c5e;
    --accent-green: #8bc34a;
    --cream: #f5f5dc;
    --white: #ffffff;
    --text-dark: #2c3e50;
    --shadow: rgba(0, 0, 0, 0.1);
    --red-heart: #ff4757;
  }

  /* Body styles */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    margin: 0;
    padding-top: 72px; /* for fixed header */
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Floating Background Elements */
  .floating-element {
    position: fixed;
    opacity: 0.12;
    font-size: 2.8rem;
    user-select: none;
    animation: floatUpDown 6s ease-in-out infinite;
    pointer-events: none;
    filter: drop-shadow(0 0 3px var(--primary-green));
    z-index: 0;
  }

  .floating-element:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
  .floating-element:nth-child(2) { top: 20%; right: 15%; animation-delay: 1.5s; }
  .floating-element:nth-child(3) { bottom: 20%; left: 20%; animation-delay: 3s; }
  .floating-element:nth-child(4) { bottom: 30%; right: 10%; animation-delay: 4.5s; }
  .floating-element:nth-child(5) { top: 50%; left: 5%; animation-delay: 1s; }
  .floating-element:nth-child(6) { top: 60%; right: 5%; animation-delay: 2.7s; }

  @keyframes floatUpDown {
    0%, 100% { transform: translateY(0); opacity: 0.9; }
    50% { transform: translateY(-18px); opacity: 0.5; }
  }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: var(--primary-green);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    z-index: 1000;
    color: var(--white);
    font-weight: 600;
    font-size: 1.15rem;
  }

  header .logo {
    display: flex; 
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  header .logo-icon {
    font-size: 1.7rem;
    animation: pulseRotate 4s infinite;
    display: inline-block;
  }
  @keyframes pulseRotate {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.15) rotate(10deg); }
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 24px;
    width: calc(100% - 48px);
    height: 3px;
    background: var(--accent-green);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  header.active::after {
    transform: scaleX(1);
  }

  /* Wishlist Container */
  .wishlist-container {
    max-width: 1000px;
    margin: 24px auto;
    padding: 0 12px 48px;
    position: relative;
    z-index: 1;
  }

  .wishlist-title {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 28px;
    color: var(--primary-green);
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* Cards Grid */
  .wishlist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
    gap: 24px;
  }

  /* Each wishlist card */
  .wish-card {
    background: var(--white);
    border-radius: 20px;
    box-shadow: 0 12px 20px var(--shadow);
    transition: box-shadow 0.3s ease, transform 0.3s ease;
    overflow: hidden;
    position: relative;
    cursor: default;
    opacity: 0;
    transform: translateY(15px);
    animation: fadeInUp 0.5s forwards;
  }
  .wish-card:hover {
    box-shadow: 0 28px 38px rgba(45,95,63,0.28);
    transform: translateY(-8px) scale(1.03);
  }

  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .wish-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    transition: transform 0.4s ease;
  }
  .wish-card:hover .wish-img {
    transform: scale(1.07);
  }

  .wish-body {
    padding: 18px 20px 22px;
  }

  .wish-name {
    font-weight: 700;
    font-size: 1.22rem;
    margin-bottom: 8px;
    color: var(--primary-green);
    user-select: none;
  }

  .wish-price {
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 10px;
    color: var(--accent-green);
  }

  /* Ratings */
  .wish-rating {
    color: #f4c150; /* gold star color */
    font-size: 1.1rem;
  }
  .wish-rating span:not(:last-child) {
    margin-right: 4px;
  }

  /* Buttons container */
  .wish-actions {
    display: flex;
    justify-content: space-between;
    padding: 8px 20px 18px;
  }

  /* Buttons Base */
  button {
    background: var(--primary-green);
    color: var(--white);
    font-weight: 600;
    border-radius: 14px;
    border: none;
    padding: 12px 18px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  button:hover {
    background: var(--light-green);
  }

  /* Ripple effect */
  button:after {
    content: "";
    position: absolute;
    border-radius: 50%;
    width: 100px;
    height: 100px;
    background: rgba(255, 255, 255, 0.28);
    opacity: 0;
    pointer-events: none;
    animation: ripple 0.6s linear;
    transform: scale(0);
    top: 50%;
    left: 50%;
    transform-origin: center;
  }

  button:active:after {
    opacity: 1;
    animation-name: ripple;
  }

  @keyframes ripple {
    to {
      opacity: 0;
      transform: scale(3);
    }
  }

  button.remove-btn {
    background: #ff4757;
  }
  button.remove-btn:hover {
    background: #e63946;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    color: var(--primary-green);
    font-size: 1.4rem;
    margin: 100px 20px;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0;}
    to { opacity: 0.8;}
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent-green);
    color: white;
    padding: 14px 26px;
    border-radius: 16px;
    box-shadow: 0 8px 36px rgba(139, 195, 74, 0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    font-weight: 700;
    letter-spacing: 0.02em;
    font-size: 1.05rem;
  }
  .toast.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .wish-actions {
      flex-direction: column;
      gap: 10px;
    }
    button {
      width: 100%;
    }
  }
  .cart-item:hover{
  transform: scale(1.02);
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<!-- Wishlist Page -->
<!-- Floating Background Elements -->
<div class="floating-element" style="top: 10%; left: 10%;">🌿</div>
<div class="floating-element" style="top: 20%; right: 15%;">🌱</div>
<div class="floating-element" style="bottom: 20%; left: 20%;">🍃</div>
<div class="floating-element" style="bottom: 30%; right: 10%;">🌳</div>
<div class="floating-element" style="top: 50%; left: 5%;">🌺</div>
<div class="floating-element" style="top: 60%; right: 5%;">🌻</div>

<header>
  <div class="logo" onclick="goHome()">
    <span class="logo-icon">🌿</span> GreenVibe
  </div>
  Wishlist
</header>

<main class="wishlist-container">
  <h1 class="wishlist-title">My Wishlist</h1>

  <!-- Wishlist Grid -->
  <div id="wishlistGrid" class="wishlist-grid"></div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <p>Your wishlist is empty! Start adding some green friends. 🌱</p>
    <button id="shopNowBtn">Shop Now</button>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>
</main>

<script>
  // ✅ COPY THIS FROM SHOP PAGE
const plants = JSON.parse(localStorage.getItem("allPlants")) || [];
  // ===== Utility: Convert rating decimal to stars =====
  function getStars(rating) {
    const fullStars = Math.floor(rating);
    const halfStar = rating - fullStars >= 0.5;
    let starsHTML = "⭐".repeat(fullStars);
    if (halfStar) starsHTML += "✰";
    return starsHTML;
  }

  // ===== Show toast notification =====
  function showToast(icon = "", message) {
    const toast = document.getElementById("toast");
    toast.textContent = icon ? `${icon} ${message}` : message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }

  // ===== Load wishlist from localStorage =====
  function loadWishlistItems() {
    const wishlistIds = JSON.parse(localStorage.getItem('wishlist') || '[]');
    return wishlistIds
      .map(id => plants.find(p => p.id === Number(id)))
      .filter(Boolean);
  }

  // ===== Add item to cart =====
  function addToCart(itemId) {
  const item = wishlistItems.find(i => i.id === itemId);
  if (!item) return;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const existing = cart.find(p => p.id === item.id);

  if(existing){
    existing.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  showToast("✓", `${item.name} added to cart!`);
  removeFromWishlist(itemId);
}

  // ===== Remove item from wishlist =====
  function removeFromWishlist(itemId) {
    const card = document.querySelector(`.wish-card[data-id="${itemId}"]`);
    if (card) {
      card.style.transition = "all 0.4s ease";
      card.style.transform = "translateX(120%) rotate(15deg)";
      card.style.opacity = "0";
    }

    setTimeout(() => {
      // Remove from local array
      wishlistItems = wishlistItems.filter(i => i.id !== itemId);

      // Remove from localStorage
      let storedWishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
      storedWishlist = storedWishlist.filter(id => Number(id) !== itemId);
      localStorage.setItem('wishlist', JSON.stringify(storedWishlist));

      renderWishlist();
      showToast("💔", "Item removed from wishlist.");
    }, 400);
  }

  // ===== Render wishlist =====
  function renderWishlist() {
    const grid = document.getElementById("wishlistGrid");
    const emptyState = document.getElementById("emptyState");

    // Refresh wishlist items
    wishlistItems = loadWishlistItems();

    if (wishlistItems.length === 0) {
      grid.style.display = "none";
      emptyState.style.display = "block";

      // Shop Now button click
      const shopBtn = document.getElementById("shopNowBtn");
      if (shopBtn) shopBtn.onclick = () => window.location.href = "shop.html";

      // Auto-redirect after 5s
      setTimeout(() => window.location.href = "shop.html", 5000);
      return;
    }

    grid.style.display = "grid";
    emptyState.style.display = "none";

    // Render wishlist items
    grid.innerHTML = wishlistItems.map((item, index) => `
      <div class="wish-card" data-id="${item.id}" style="animation-delay:${index * 0.15}s;">
        <img src="${item.image}" alt="${item.name}" class="wish-img" loading="lazy"/>
        <div class="wish-body">
          <h3 class="wish-name">${item.name}</h3>
          <p class="wish-price">₹${item.price}</p>
          <p class="wish-rating">${getStars(item.rating)}</p>
        </div>
        <div class="wish-actions">
          <button onclick="addToCart(${item.id})">Add to Cart</button>
          <button class="remove-btn" onclick="removeFromWishlist(${item.id})">Remove</button>
        </div>
      </div>
    `).join("");
  }

  // ===== Navigate to home page =====
  function goHome() {
    window.location.href = "index.html";
  }

  // ===== Initialize =====
  let wishlistItems = loadWishlistItems();
  window.addEventListener('load', renderWishlist);
</script>
